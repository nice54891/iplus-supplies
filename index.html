<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาทำงาน - ไอ พลัส ซัพพลายส์</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* ---------------- PAGE: LOGIN & SIGNIN ---------------- */
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; }
        .auth-card h2 { margin-top: 0; color: #2c3e50; margin-bottom: 25px; }
        .form-group-auth { margin-bottom: 18px; text-align: left; }
        .form-group-auth label { font-size: 14px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 8px; }
        .form-group-auth input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-auth { width: 100%; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-login { background-color: #2563eb; }
        .btn-login:hover { background-color: #1d4ed8; }
        .btn-signin { background-color: #10b981; }
        .btn-signin:hover { background-color: #059669; }
        .switch-link { display: inline-block; margin-top: 20px; font-size: 14px; color: #2563eb; text-decoration: none; cursor: pointer; }
        
        /* ---------------- PAGE: MAIN APP ---------------- */
        .main-app { width: 100%; max-width: 950px; padding: 20px; box-sizing: border-box; display: none; }
        .header-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #e2e8f0; padding: 12px 20px; border-radius: 10px; box-sizing: border-box; }
        .btn-action { border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-logout { background-color: #64748b; color: white; }
        .btn-password { background-color: #0ea5e9; color: white; }
        .container { width: 100%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h2, h3 { color: #2c3e50; margin-top: 0; }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 10px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .form-group label { font-size: 14px; font-weight: bold; color: #4a5568; margin-bottom: 5px; display: block; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button.btn-add { background-color: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; align-self: end; }
        
        /* TABLES */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
